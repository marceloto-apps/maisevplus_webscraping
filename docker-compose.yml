

services:
  # ----------------------------------------------------------
  # Backend API (Node.js — stage dev)
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      target: dev
    container_name: maisev_backend
    restart: unless-stopped
    env_file:
      - .env
    network_mode: "host"
    volumes:
      - ./backend:/usr/src/app
      # Proteção do node_modules de dentro do container
      - /usr/src/app/node_modules
